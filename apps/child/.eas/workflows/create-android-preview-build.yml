name: Create Android Preview Build

on:
  push:
    branches:
      - master
    paths:
      - apps/child/**
      - packages/**
      - package.json
      - package-lock.json

jobs:
  android_preview_build:
    name: Build Android preview APK
    type: build
    params:
      platform: android
      profile: preview
      message: "Android preview build from GitHub push"
